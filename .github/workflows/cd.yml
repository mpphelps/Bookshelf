name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Sync latest main
        working-directory: /home/mpphelps/Bookshelf
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Materialize .env from GitHub Secrets
        working-directory: /home/mpphelps/Bookshelf
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
          AUTH0_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID }}
          AUTH0_CLIENT_SECRET: ${{ secrets.AUTH0_CLIENT_SECRET }}
          AUTH0_AUDIENCE: ${{ secrets.AUTH0_AUDIENCE }}
          AUTH0_CALLBACK_URL: ${{ secrets.AUTH0_CALLBACK_URL }}
        run: |
          # Refuse to write a broken .env if any secret is missing
          for var in POSTGRES_PASSWORD SESSION_SECRET AUTH0_DOMAIN AUTH0_CLIENT_ID AUTH0_CLIENT_SECRET AUTH0_AUDIENCE AUTH0_CALLBACK_URL; do
            if [ -z "${!var}" ]; then
              echo "ERROR: required secret $var is missing or empty" >&2
              exit 1
            fi
          done

          umask 077
          cat > packages/database/.env <<EOF
          POSTGRES_USER=bookshelf
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_DB=bookshelf
          DATABASE_URL=postgresql://bookshelf:${POSTGRES_PASSWORD}@db:5432/bookshelf
          SESSION_SECRET=${SESSION_SECRET}
          AUTH0_DOMAIN=${AUTH0_DOMAIN}
          AUTH0_CLIENT_ID=${AUTH0_CLIENT_ID}
          AUTH0_CLIENT_SECRET=${AUTH0_CLIENT_SECRET}
          AUTH0_AUDIENCE=${AUTH0_AUDIENCE}
          AUTH0_CALLBACK_URL=${AUTH0_CALLBACK_URL}
          EOF

      - name: Rebuild and restart stack
        working-directory: /home/mpphelps/Bookshelf
        run: docker compose -f docker-compose.prod.yml --env-file packages/database/.env up -d --build

      - name: Wait for app to be healthy
        run: |
          for i in {1..30}; do
            if curl -fs http://localhost:3000/health > /dev/null; then
              echo "App responded to /health"
              exit 0
            fi
            echo "Waiting for app... ($i/30)"
            sleep 2
          done
          echo "App did not become healthy within 60s"
          docker compose -f docker-compose.prod.yml -p bookshelf-prod logs --tail=100 app
          exit 1

      - name: Prune old Docker images
        run: docker image prune -f

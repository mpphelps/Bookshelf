name: bookshelf-prod

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: bookshelf:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - packages/database/.env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?missing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?missing}
      POSTGRES_DB: ${POSTGRES_DB:?missing}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?missing}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata_prod:

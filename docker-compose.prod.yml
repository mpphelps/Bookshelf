name: bookshelf-prod

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: bookshelf:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - packages/database/.env
    environment:
      DATABASE_URL: postgresql://bookshelf:bookshelf@db:5432/bookshelf
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: bookshelf
      POSTGRES_PASSWORD: bookshelf
      POSTGRES_DB: bookshelf
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookshelf"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata_prod:
